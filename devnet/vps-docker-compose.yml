version: "3.8"

services:
  db:
    image: postgres:15
    container_name: ethernova-devnet-db
    restart: always
    environment:
      POSTGRES_PASSWORD: devnetblock2026
      POSTGRES_USER: blockscout
      POSTGRES_DB: blockscout_devnet
    volumes:
      - devnet-db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:17432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout_devnet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ethernova-devnet-redis
    restart: always
    ports:
      - "127.0.0.1:26379:6379"

  backend:
    image: blockscout/blockscout:latest
    container_name: ethernova-devnet-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' && bin/blockscout start"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://blockscout:devnetblock2026@db:5432/blockscout_devnet
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: http://host.docker.internal:28545
      ETHEREUM_JSONRPC_WS_URL: ws://host.docker.internal:28546
      ETHEREUM_JSONRPC_TRACE_URL: http://host.docker.internal:28545
      NETWORK: "Ethernova Devnet"
      SUBNETWORK: Devnet
      CHAIN_ID: "121526"
      COIN: NOVA
      COIN_NAME: NOVA
      COIN_DECIMALS: "18"
      BLOCK_REWARD: "10000000000000000000"
      SUPPORTED_CHAINS: "[]"
      BLOCK_TRANSFORMER: base
      FIRST_BLOCK: "0"
      DISABLE_EXCHANGE_RATES: "true"
      DISABLE_KNOWN_TOKENS: "true"
      DISABLE_MARKET: "true"
      DISABLE_WEBAPP: "true"
      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
      INDEXER_DISABLE_COIN_BALANCES_FETCHER: "true"
      POOL_SIZE: "15"
      POOL_SIZE_API: "8"
      ECTO_USE_SSL: "false"
      SECRET_KEY_BASE: "a9f2c8d4e6b0123456789abcdef0123456789abcdef0123456789abcdef012345"
      PORT: "4000"
      BLOCKSCOUT_HOST: dev.ethnova.net
      BLOCKSCOUT_PROTOCOL: https
      API_V2_ENABLED: "true"
      API_RATE_LIMIT_IS_BLOCKSCOUT_BEHIND_PROXY: "true"
      MIX_ENV: prod
    ports:
      - "127.0.0.1:14000:4000"

  proxy:
    image: nginx:alpine
    container_name: ethernova-devnet-proxy
    restart: always
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx-devnet.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:18080:8080"

  frontend:
    image: ghcr.io/blockscout/frontend:latest
    container_name: ethernova-devnet-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_HOST: dev.ethnova.net
      NEXT_PUBLIC_API_PORT: "443"
      NEXT_PUBLIC_API_PROTOCOL: https
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: wss
      NEXT_PUBLIC_APP_HOST: dev.ethnova.net
      NEXT_PUBLIC_APP_PORT: "443"
      NEXT_PUBLIC_APP_PROTOCOL: https
      NEXT_PUBLIC_NETWORK_NAME: "Ethernova Devnet"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: "NOVA-Dev"
      NEXT_PUBLIC_NETWORK_ID: "121526"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: NOVA
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: NOVA
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_NETWORK_CURRENCY_WEI_NAME: wei
      NEXT_PUBLIC_NETWORK_VERIFICATION_TYPE: mining
      NEXT_PUBLIC_IS_TESTNET: "true"
      NEXT_PUBLIC_API_BASE_PATH: /
      NEXT_PUBLIC_COLOR_THEME_DEFAULT: dark
      NEXT_PUBLIC_HOMEPAGE_PLATE_BACKGROUND: "#111a33"
      NEXT_PUBLIC_HOMEPAGE_PLATE_TEXT_COLOR: "#eaf0ff"
      NEXT_PUBLIC_AD_BANNER_PROVIDER: none
      NEXT_PUBLIC_AD_TEXT_PROVIDER: none
      NEXT_PUBLIC_PROMOTE_BLOCKSCOUT_IN_TITLE: "false"
      NEXT_PUBLIC_OG_DESCRIPTION: "Ethernova Devnet Explorer - Search transactions, verify contracts, analyze addresses."
      NEXT_PUBLIC_OTHER_LINKS: "[]"
      NEXT_PUBLIC_FOOTER_LINKS: "[]"
      NEXT_PUBLIC_NETWORK_LOGO: "data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22300%22%20height%3D%2240%22%20viewBox%3D%220%200%20300%2040%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%22300%22%20y2%3D%220%22%20gradientUnits%3D%22userSpaceOnUse%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%237c5cff%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%2325e6ff%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Ctext%20x%3D%220%22%20y%3D%2228%22%20font-family%3D%22Poppins%2C%20Inter%2C%20sans-serif%22%20font-size%3D%2228%22%20font-weight%3D%22600%22%20fill%3D%22url%28%23g%29%22%3EEthernova%20Devnet%3C%2Ftext%3E%3C%2Fsvg%3E"
      NEXT_PUBLIC_NETWORK_LOGO_DARK: "data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22300%22%20height%3D%2240%22%20viewBox%3D%220%200%20300%2040%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%22300%22%20y2%3D%220%22%20gradientUnits%3D%22userSpaceOnUse%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%237c5cff%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%2325e6ff%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Ctext%20x%3D%220%22%20y%3D%2228%22%20font-family%3D%22Poppins%2C%20Inter%2C%20sans-serif%22%20font-size%3D%2228%22%20font-weight%3D%22600%22%20fill%3D%22url%28%23g%29%22%3EEthernova%20Devnet%3C%2Ftext%3E%3C%2Fsvg%3E"
      NEXT_PUBLIC_NETWORK_ICON: "data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2264%22%20height%3D%2264%22%20viewBox%3D%220%200%2064%2064%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%2264%22%20y2%3D%2264%22%20gradientUnits%3D%22userSpaceOnUse%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%237c5cff%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%2325e6ff%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%2226%22%20fill%3D%22%230b1020%22%20stroke%3D%22url%28%23g%29%22%20stroke-width%3D%223%22%2F%3E%3Cpath%20d%3D%22M32%2014l3.6%2010.6L46%2025l-8.8%206.4L40%2042l-8-5.6-8%205.6%202.8-10.6L18%2025l10.4-.4L32%2014z%22%20fill%3D%22url%28%23g%29%22%2F%3E%3C%2Fsvg%3E"
      NEXT_PUBLIC_NETWORK_ICON_DARK: "data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2264%22%20height%3D%2264%22%20viewBox%3D%220%200%2064%2064%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%2264%22%20y2%3D%2264%22%20gradientUnits%3D%22userSpaceOnUse%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%237c5cff%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%2325e6ff%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%2226%22%20fill%3D%22%230b1020%22%20stroke%3D%22url%28%23g%29%22%20stroke-width%3D%223%22%2F%3E%3Cpath%20d%3D%22M32%2014l3.6%2010.6L46%2025l-8.8%206.4L40%2042l-8-5.6-8%205.6%202.8-10.6L18%2025l10.4-.4L32%2014z%22%20fill%3D%22url%28%23g%29%22%2F%3E%3C%2Fsvg%3E"
      NEXT_PUBLIC_HOMEPAGE_HERO_BANNER_CONFIG: '{"background":["radial-gradient(120% 120% at 0% 0%, rgba(124,92,255,0.24) 0%, rgba(37,230,255,0.14) 45%, rgba(0,0,0,0) 100%), #0b1020","radial-gradient(120% 120% at 0% 0%, rgba(124,92,255,0.3) 0%, rgba(37,230,255,0.16) 45%, rgba(0,0,0,0) 100%), #070a14"],"text_color":["#eaf0ff","#eaf0ff"],"border":["1px solid rgba(124,92,255,0.25)","1px solid rgba(37,230,255,0.22)"]}'
      NEXT_PUBLIC_COLOR_THEME_OVERRIDES: '{"bg":{"primary":{"_light":{"value":"#0b1020"},"_dark":{"value":"#0b1020"}}},"text":{"primary":{"_light":{"value":"#eaf0ff"},"_dark":{"value":"#eaf0ff"}},"secondary":{"_light":{"value":"#a8b4d9"},"_dark":{"value":"#a8b4d9"}}},"hover":{"_light":{"value":"#7c5cff"},"_dark":{"value":"#7c5cff"}},"icon":{"primary":{"_light":{"value":"#eaf0ff"},"_dark":{"value":"#eaf0ff"}},"secondary":{"_light":{"value":"#7c5cff"},"_dark":{"value":"#7c5cff"}}},"button":{"primary":{"_light":{"value":"#7c5cff"},"_dark":{"value":"#7c5cff"}}},"link":{"primary":{"_light":{"value":"#25e6ff"},"_dark":{"value":"#25e6ff"}}},"graph":{"line":{"_light":{"value":"#25e6ff"},"_dark":{"value":"#25e6ff"}},"gradient":{"start":{"_light":{"value":"rgba(37,230,255,0.35)"},"_dark":{"value":"rgba(37,230,255,0.35)"}},"stop":{"_light":{"value":"rgba(37,230,255,0)"},"_dark":{"value":"rgba(37,230,255,0)"}}}},"navigation":{"bg":{"selected":{"_light":{"value":"rgba(124,92,255,0.18)"},"_dark":{"value":"rgba(124,92,255,0.18)"}}},"text":{"selected":{"_light":{"value":"#25e6ff"},"_dark":{"value":"#25e6ff"}}}},"stats":{"bg":{"_light":{"value":"#111a33"},"_dark":{"value":"#111a33"}}},"topbar":{"bg":{"_light":{"value":"#111a33"},"_dark":{"value":"#111a33"}}},"tabs":{"text":{"primary":{"_light":{"value":"#7c5cff"},"_dark":{"value":"#7c5cff"}}}}}'
    expose:
