services:
  db:
    image: postgres:15
    container_name: ethernova-db
    restart: always
    environment:
      POSTGRES_PASSWORD: 112d53fd2b2b4398ae87b8c037375e7e
      POSTGRES_USER: blockscout
      POSTGRES_DB: blockscout
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:7432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ethernova-redis
    restart: always
    ports:
      - "127.0.0.1:16379:6379"

  backend:
    image: blockscout/blockscout:latest
    container_name: ethernova-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' && bin/blockscout start"
    volumes:
      - /opt/ethernova/genesis-121525-alloc.json:/app/genesis-121525-alloc.json:ro
    environment:
      DATABASE_URL: postgresql://blockscout:112d53fd2b2b4398ae87b8c037375e7e@db:5432/blockscout
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: http://host.docker.internal:8545
      ETHEREUM_JSONRPC_WS_URL: ws://host.docker.internal:8546
      ETHEREUM_JSONRPC_TRACE_URL: http://host.docker.internal:8545
      NETWORK: Ethernova
      SUBNETWORK: Ethernova
      CHAIN_ID: "121525"
      COIN: NOVA
      COIN_NAME: NOVA
      BLOCK_REWARD: "10000000000000000000"
      CHAIN_SPEC_PATH: /app/genesis-121525-alloc.json
      POOL_SIZE: "20"
      POOL_SIZE_API: "10"
      ECTO_USE_SSL: "false"
      SECRET_KEY_BASE: 5d666fafbcd3c476001930a9020cd0524d49cb74fbb96454919c30e7aa5e2339c5f9c3730b526b78c153d16af6b04a5e20d381fa89c646c3aab842cbfd44f14e
      PORT: "4000"
      BLOCKSCOUT_HOST: explorer.ethnova.net
      BLOCKSCOUT_PROTOCOL: https
      API_V2_ENABLED: "true"
      DISABLE_MARKET: "true"
      DISABLE_WEBAPP: "true"
      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
      FIRST_BLOCK: "0"
      MIX_ENV: prod
    ports:
      - "127.0.0.1:4000:4000"

  frontend:
    image: ghcr.io/blockscout/frontend:latest
    container_name: ethernova-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_HOST: explorer.ethnova.net
      NEXT_PUBLIC_API_PORT: "443"
      NEXT_PUBLIC_API_PROTOCOL: https
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: wss
      NEXT_PUBLIC_NETWORK_NAME: Ethernova
      NEXT_PUBLIC_NETWORK_SHORT_NAME: Ethernova
      NEXT_PUBLIC_NETWORK_ID: "121525"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: NOVA
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: NOVA
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_IS_TESTNET: "false"
      NEXT_PUBLIC_APP_HOST: explorer.ethnova.net
      NEXT_PUBLIC_APP_PORT: "443"
      NEXT_PUBLIC_APP_PROTOCOL: https
      NEXT_PUBLIC_COLOR_THEME_DEFAULT: dark
      NEXT_PUBLIC_AD_BANNER_PROVIDER: none
      NEXT_PUBLIC_AD_TEXT_PROVIDER: none
      NEXT_PUBLIC_PROMOTE_BLOCKSCOUT_IN_TITLE: "false"
      NEXT_PUBLIC_FOOTER_LINKS: "[]"

  proxy:
    image: nginx:alpine
    container_name: ethernova-proxy
    restart: always
    depends_on:
      - backend
      - frontend
    volumes:
      - ./proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  db-data:
