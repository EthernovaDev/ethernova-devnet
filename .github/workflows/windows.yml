name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Build ethernova
        shell: pwsh
        env:
          CGO_ENABLED: "0"
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          go build -trimpath -buildvcs=false -o bin/ethernova.exe ./cmd/geth
          Write-Host "Build complete"

      - name: Verify binary
        shell: pwsh
        run: bin\ethernova.exe version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ethernova-windows
          path: bin/ethernova.exe
