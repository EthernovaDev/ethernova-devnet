name: release
# DISABLED: was uploading duplicate binaries with old names (ethernova-linux-amd64, ethernova-windows-amd64.exe)
# We manually upload EthernovaDevnet.exe and EthernovaDevnet-linux-amd64 instead.
on:
  workflow_dispatch:
#  push:
#    tags:
#      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: ethernova-linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: ethernova-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -buildvcs=false -o "dist/${{ matrix.binary }}" ./cmd/geth

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Prepare release
        run: |
          mkdir -p assets
          cp release/ethernova-linux-amd64/ethernova-linux-amd64 assets/
          cp release/ethernova-windows-amd64.exe/ethernova-windows-amd64.exe assets/
          cd assets && sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            assets/ethernova-linux-amd64
            assets/ethernova-windows-amd64.exe
            assets/SHA256SUMS.txt
